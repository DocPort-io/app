name: "docport-dev"

services:
  database:
    image: postgres:18.3
    environment:
      POSTGRES_DB: "docport"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
    ports:
      - "5432:5432"
    volumes:
      - database-data:/var/lib/postgresql
      - ./deployment/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.5
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://database:5432/docport
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      KC_DB_SCHEMA: keycloak
    ports:
      - "8081:8080"
    volumes:
      - ./deployment/keycloak:/opt/keycloak/data/import:ro
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | grep -q '\"status\": \"UP\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  backend:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - app-data:/app/data/storage
    environment:
      DOCPORT_DATABASE_DSN: "postgresql://postgres:postgres@database:5432/docport"
      DOCPORT_AUTH_JWKS_URL: "http://keycloak:8080/auth/realms/docport/protocol/openid-connect/certs"
    depends_on:
      database:
        condition: service_healthy
      keycloak:
        condition: service_healthy

volumes:
  database-data:
  app-data:
