name: "docport-dev"

services:
  database:
    image: postgres:18.3
    environment:
      POSTGRES_DB: "docport"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
    ports:
      - "5432:5432"
    volumes:
      - database-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - app-data:/app/data/storage
    depends_on:
      database:
        condition: service_healthy

volumes:
  database-data:
  app-data:
